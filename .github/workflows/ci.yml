name: CI

# ADR-064 Phase 1 — the merge gate. Every wire's documented discipline
# (tests, contract drift, types, build) is enforced by machine, not memory.
on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ADR-082 — the contract wall. The neutral contract is in-repo now, so the
  # "you cannot casually edit the contract" friction the old submodule provided
  # is enforced here instead: a PR that changes a *response* schema without
  # bumping contract-version.json fails. (Conformance/drift of the *content* is
  # the gate/core jobs' business — this job only guards the versioning act.)
  #
  # Scope = the *-response schemas only (ADR-084 §4 refinement). The
  # request/response asymmetry is the contract's own governance model
  # (ADR-074 §5, ADR-081, ADR-084 §4): the RESPONSE is the deploy-boundary
  # contract consumers depend on (a core-API version mismatch is rejected with
  # 400), so a structural change there is a deliberate contractVersion bump.
  # The REQUEST side is open payload / layoutVersion-governed — optional
  # additions there (ADR-083 robot.base, ADR-084 plan{}/robot.tcpOrientation)
  # do NOT bump contractVersion. Watching the whole schema/ dir conflated the
  # two and fired the wall on request-only edits; this narrows it to the
  # governed surface without weakening the response guard.
  contract-wall:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for base comparison)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Response schema change requires a contractVersion bump
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --quiet
          RESPONSE_SCHEMAS="packages/grasp-contract/schema/grasp-search-response.schema.json packages/grasp-contract/schema/recommendation-response.schema.json"
          if git diff --quiet "$BASE"...HEAD -- $RESPONSE_SCHEMAS; then
            echo "response schemas unchanged — wall not engaged (request-side edits are open payload / layoutVersion-governed, ADR-074/084)"
          elif git diff --quiet "$BASE"...HEAD -- packages/grasp-contract/contract-version.json; then
            echo "::error::a *-response schema changed without a contractVersion bump (packages/grasp-contract/contract-version.json). Response contract changes are deliberate versioned acts (ADR-082/074)."
            exit 1
          else
            echo "response schema changed together with a contractVersion bump — OK"
          fi

  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No submodule init needed: the neutral contract lives in-repo at
      # packages/grasp-contract (ADR-082). The robotics-wasm vendor
      # submodules (Eigen/KDL/ruckig) stay out — CI uses the committed
      # WASM artifacts, never a C++/Rust toolchain.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Glob execution — a new *.test.js under src/ is picked up
      # automatically; there is no manual list to forget (PHILOSOPHY #11).
      - name: Unit tests
        run: pnpm test

      - name: Contract conformance + drift
        run: pnpm test:contract

      - name: Type check
        run: pnpm typecheck

      - name: Build (committed WASM artifacts)
        run: pnpm build

  # Backend judgement engine (core/ — ADR-075/076). A separate job from the
  # JS gate: different toolchain (Python via uv). Its contract-conformance
  # tests (pydantic ⇄ neutral JSON Schema binding) read the in-repo schema
  # through core/tests/contract_pkg.py → packages/grasp-contract (ADR-082).
  # Same ADR-064 rule as everything else: the wire's discipline is enforced
  # by machine, not memory.
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: core/uv.lock

      - name: Sync dependencies (locked)
        working-directory: core
        run: uv sync --frozen --extra dev --extra serve

      - name: Core tests (engine + api + contract conformance)
        working-directory: core
        run: uv run pytest

  # ADR-064 Phase 4 — play-side smoke. A separate job so its flakiness never
  # blocks the type/contract gate (PHILOSOPHY #20 — a narrow smoke, not a
  # coverage net). Verifies the experience layer's wiring is live end-to-end:
  # boot → box add → undo → template load → negotiate tab, plus a
  # prefers-reduced-motion pass.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Only Chromium — the smoke targets one engine (no cross-browser matrix).
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke E2E
        run: pnpm test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
