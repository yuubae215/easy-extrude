name: CI

# ADR-064 Phase 1 — the merge gate. Every wire's documented discipline
# (tests, contract drift, types, build) is enforced by machine, not memory.
on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Only the contract submodule is needed (test:contract). The
      # robotics-wasm vendor submodules (Eigen/KDL/ruckig) stay out —
      # CI uses the committed WASM artifacts, never a C++/Rust toolchain.
      - name: Init grasp-contract submodule
        run: git submodule update --init vendor/grasp-contract

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Glob execution — a new *.test.js under src/ is picked up
      # automatically; there is no manual list to forget (PHILOSOPHY #11).
      - name: Unit tests
        run: pnpm test

      - name: Contract conformance + drift
        run: pnpm test:contract

      - name: Type check
        run: pnpm typecheck

      - name: Build (committed WASM artifacts)
        run: pnpm build

  # ADR-064 Phase 4 — play-side smoke. A separate job so its flakiness never
  # blocks the type/contract gate (PHILOSOPHY #20 — a narrow smoke, not a
  # coverage net). Verifies the experience layer's wiring is live end-to-end:
  # boot → box add → undo → template load → negotiate tab, plus a
  # prefers-reduced-motion pass.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init grasp-contract submodule
        run: git submodule update --init vendor/grasp-contract

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The Chromium binary (~150 MB) is the e2e job's slowest step. Cache it
      # keyed on the pinned @playwright/test version so a hit skips the download.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      # Only Chromium — the smoke targets one engine (no cross-browser matrix).
      # On a cache hit the browser is already present, so install just the
      # apt system deps (fast); on a miss, download the browser too.
      - name: Install Playwright Chromium
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm exec playwright install-deps chromium
          else
            pnpm exec playwright install --with-deps chromium
          fi

      - name: Smoke E2E
        run: pnpm test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
